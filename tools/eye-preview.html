<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Motorhome Eye Preview</title>
<style>
:root{color-scheme:dark;--bg:#07090d;--panel:#10151d;--panel-2:#151d28;--text:#eef4ff;--muted:#92a0b3;--line:#263244;--accent:#ff7a18;--focus:#74d2ff}*{box-sizing:border-box}body{margin:0;min-height:100vh;background:var(--bg);color:var(--text);font-family:Arial,Helvetica,sans-serif}main{width:min(1180px,calc(100vw - 32px));margin:0 auto;padding:28px 0}header{display:flex;align-items:end;justify-content:space-between;gap:16px;margin-bottom:18px}h1{margin:0;font-size:clamp(28px,5vw,48px);letter-spacing:0;line-height:1}.subhead{margin:8px 0 0;color:var(--muted);font-size:15px}.workspace{display:grid;grid-template-columns:minmax(0,1fr) 340px;gap:16px;align-items:start}.preview,.controls{background:var(--panel);border:1px solid var(--line);border-radius:8px}.preview{padding:16px}.matrix-wrap{overflow-x:auto;padding-bottom:8px}.matrix{display:grid;grid-template-columns:repeat(64,12px);grid-template-rows:repeat(8,12px);gap:4px;width:max-content;margin:0 auto;padding:14px;background:#030406;border:1px solid #1c2532;border-radius:8px}.led{width:12px;height:12px;border-radius:50%;background:#111723;box-shadow:inset 0 0 0 1px rgba(255,255,255,.05)}.led.on{box-shadow:0 0 10px currentColor,inset 0 0 0 1px rgba(255,255,255,.2)}.controls{padding:16px}.field{display:grid;gap:7px;margin-bottom:14px}label{color:var(--muted);font-size:13px;font-weight:700;text-transform:uppercase}select,input,textarea,button{width:100%;border:1px solid var(--line);border-radius:6px;background:var(--panel-2);color:var(--text);font:inherit}select,input{height:42px;padding:0 10px}textarea{min-height:290px;padding:12px;resize:vertical;font-family:Consolas,"Courier New",monospace;font-size:12px;line-height:1.45}button{height:42px;cursor:pointer;background:var(--accent);border-color:#ff943e;color:#170900;font-weight:700}select:focus,input:focus,textarea:focus,button:focus{outline:2px solid var(--focus);outline-offset:2px}.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:14px}.stat{background:var(--panel-2);border:1px solid var(--line);border-radius:8px;padding:12px}.stat strong{display:block;font-size:24px;line-height:1.1}.stat span{color:var(--muted);font-size:12px}.hint{color:var(--muted);font-size:13px;line-height:1.5;margin:12px 0 0}@media (max-width:900px){header,.workspace{display:block}.controls{margin-top:16px}.stats{grid-template-columns:1fr}}
</style>
</head>
<body>
<main>
<header><div><h1>RV Crazy Eyes</h1><p class="subhead">64x8 WLED matrix preview for one chained eye panel.</p></div></header>
<section class="workspace">
<div class="preview"><div class="matrix-wrap"><div id="matrix" class="matrix" aria-label="64 by 8 LED preview"></div></div><div class="stats" aria-live="polite"><div class="stat"><strong id="litCount">0</strong><span>lit LEDs</span></div><div class="stat"><strong id="brightness">0</strong><span>brightness</span></div><div class="stat"><strong id="rangeCount">0</strong><span>color ranges</span></div></div><p class="hint">The preview assumes LED index 0 is the top-left pixel and rows run left to right. Use serpentine presets when every other row is wired in reverse.</p></div>
<aside class="controls"><div class="field"><label for="preset">Preset</label><select id="preset"></select></div><div class="field"><label for="scale">LED Size</label><input id="scale" type="range" min="8" max="22" value="12"></div><div class="field"><label for="jsonOut">WLED JSON</label><textarea id="jsonOut" spellcheck="false"></textarea></div><button id="copyButton" type="button">Copy JSON</button></aside>
</section>
</main>
<script id="presetData" type="application/json">
{"notes":{"target":"One WLED eye made from two 32x8 panels chained as a 64x8 matrix, 512 LEDs total.","wled_setup":"Use RGB color order, one segment from 0 to 512, matrix 64x8.","how_to_use":"In WLED, create a preset, open API command/JSON field, paste one command object below, and save. If the eye shape looks scrambled, try the matching serpentine variant.","source":"WLED JSON API segment individual LED control using seg.i."},"commands":{"amber_angry_eye_progressive":{"on":true,"bri":96,"transition":4,"mainseg":0,"seg":[{"id":0,"start":0,"stop":512,"on":true,"fx":0,"frz":true,"col":[[255,72,0],[0,0,0],[0,0,0]],"i":[0,512,"000000",77,120,"FF3000",142,182,"FF5400",207,246,"FF7800",271,310,"FF7800",336,374,"FF5400",401,437,"FF3000",154,160,"000000",218,225,"000000"]}]},"red_alert_eye_progressive":{"on":true,"bri":128,"transition":4,"mainseg":0,"seg":[{"id":0,"start":0,"stop":512,"on":true,"fx":0,"frz":true,"col":[[255,0,0],[0,0,0],[0,0,0]],"i":[0,512,"000000",77,120,"A00000",142,182,"FF0000",207,246,"FF2400",271,310,"FF2400",336,374,"FF0000",401,437,"A00000",154,160,"000000",218,225,"000000"]}]},"amber_angry_eye_serpentine":{"on":true,"bri":96,"transition":4,"mainseg":0,"seg":[{"id":0,"start":0,"stop":512,"on":true,"fx":0,"frz":true,"col":[[255,72,0],[0,0,0],[0,0,0]],"i":[0,512,"000000",71,114,"FF3000",142,182,"FF5400",207,246,"FF7800",265,304,"FF7800",336,374,"FF5400",401,437,"FF3000",160,166,"000000",218,225,"000000"]}]},"red_alert_eye_serpentine":{"on":true,"bri":128,"transition":4,"mainseg":0,"seg":[{"id":0,"start":0,"stop":512,"on":true,"fx":0,"frz":true,"col":[[255,0,0],[0,0,0],[0,0,0]],"i":[0,512,"000000",71,114,"A00000",142,182,"FF0000",207,246,"FF2400",265,304,"FF2400",336,374,"FF0000",401,437,"A00000",160,166,"000000",218,225,"000000"]}]}}}
</script>
<script>
const WIDTH=64,HEIGHT=8,LED_COUNT=WIDTH*HEIGHT,data=JSON.parse(document.getElementById("presetData").textContent),matrix=document.getElementById("matrix"),presetSelect=document.getElementById("preset"),scale=document.getElementById("scale"),jsonOut=document.getElementById("jsonOut"),copyButton=document.getElementById("copyButton"),litCount=document.getElementById("litCount"),brightness=document.getElementById("brightness"),rangeCount=document.getElementById("rangeCount");const leds=Array.from({length:LED_COUNT},(_,index)=>{const node=document.createElement("div");node.className="led";node.title=`LED ${index}`;matrix.appendChild(node);return node});Object.keys(data.commands).forEach(name=>{const option=document.createElement("option");option.value=name;option.textContent=name.replaceAll("_"," ");presetSelect.appendChild(option)});function parseRanges(command){const ranges=[],values=command.seg?.[0]?.i??[];for(let index=0;index<values.length;index+=3){const start=Number(values[index]),stop=Number(values[index+1]),color=String(values[index+2]??"000000");if(Number.isFinite(start)&&Number.isFinite(stop))ranges.push({start,stop,color:`#${color}`})}return ranges}function render(){const command=data.commands[presetSelect.value],colors=Array(LED_COUNT).fill("#000000"),ranges=parseRanges(command);ranges.forEach(({start,stop,color})=>{const from=Math.max(0,start),to=Math.min(LED_COUNT,stop);for(let index=from;index<to;index+=1)colors[index]=color});let lit=0;colors.forEach((color,index)=>{const isOn=color.toLowerCase()!=="#000000";leds[index].classList.toggle("on",isOn);leds[index].style.backgroundColor=color;leds[index].style.color=color;if(isOn)lit+=1});litCount.textContent=String(lit);brightness.textContent=String(command.bri??0);rangeCount.textContent=String(Math.max(0,ranges.length-1));jsonOut.value=JSON.stringify(command,null,2)}function resizeLeds(){const size=`${scale.value}px`,gap=`${Math.max(2,Math.round(Number(scale.value)/3))}px`;matrix.style.gridTemplateColumns=`repeat(${WIDTH}, ${size})`;matrix.style.gridTemplateRows=`repeat(${HEIGHT}, ${size})`;matrix.style.gap=gap;leds.forEach(led=>{led.style.width=size;led.style.height=size})}async function copyJson(){await navigator.clipboard.writeText(jsonOut.value);copyButton.textContent="Copied";window.setTimeout(()=>{copyButton.textContent="Copy JSON"},1100)}presetSelect.addEventListener("change",render);scale.addEventListener("input",resizeLeds);copyButton.addEventListener("click",copyJson);resizeLeds();render();
</script>
</body>
</html>
